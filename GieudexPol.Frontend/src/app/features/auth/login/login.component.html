<div class="auth-container">
  <h2>Logowanie</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email:</label>
      <input id="email" type="email" formControlName="email" />
      <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-message">
        <div *ngIf="loginForm.get('email')?.errors?.['required']">Email jest wymagany.</div>
        <div *ngIf="loginForm.get('email')?.errors?.['email']">Wprowadź poprawny adres email.</div>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Hasło:</label>
      <input id="password" type="password" formControlName="password" />
      <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
        <div *ngIf="loginForm.get('password')?.errors?.['required']">Hasło jest wymagane.</div>
      </div>
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Zaloguj</button>

    <div *ngIf="errorMessage" class="error-message mt-3">
      {{ errorMessage }}
    </div>

    <p class="mt-3">Nie masz konta? <a routerLink="/auth/register">Zarejestruj się</a></p>
  </form>
</div>
