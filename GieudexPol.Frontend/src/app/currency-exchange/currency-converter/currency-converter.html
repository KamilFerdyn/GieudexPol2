<div class="container">
    <h1>Symulator Wymiany Walut</h1>
    <div class="exchange-form">
        <div class="form-group">
            <label for="amount">Kwota do wymiany:</label>
            <input type="number" id="amount" placeholder="Wprowadź kwotę" min="0" step="0.01" required [(ngModel)]="amount">
        </div>

        <div class="form-group">
            <label for="sourceCurrency">Waluta źródłowa:</label>
            <select id="sourceCurrency" required [(ngModel)]="sourceCurrency">
                <option value="" disabled>Wybierz walutę źródłową</option>
                <option value="PLN">Złoty polski (PLN)</option>
                <option value="USD">Dolar amerykański (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="GBP">Funt szterling (GBP)</option>
                <option value="JPY">Jen japoński (JPY)</option>
                <option value="CHF">Frank szwajcarski (CHF)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="targetCurrency">Waluta docelowa:</label>
            <select id="targetCurrency" required [(ngModel)]="targetCurrency">
                <option value="" disabled>Wybierz walutę docelową</option>
                <option value="PLN">Złoty polski (PLN)</option>
                <option value="USD">Dolar amerykański (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="GBP">Funt szterling (GBP)</option>
                <option value="JPY">Jen japoński (JPY)</option>
                <option value="CHF">Frank szwajcarski (CHF)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fee">Prowizja (%):</label>
            <input type="number" id="fee" placeholder="Wprowadź prowizję" min="0" max="100" step="0.01" [(ngModel)]="fee" value="1">
        </div>

        <button (click)="calculateExchange()">Oblicz</button>

        <div class="result" *ngIf="resultAmount !== null">
            <p>Wynik wymiany:</p>
            <p><strong>{{ resultAmount | number:'1.2-2' }} {{ targetCurrency }}</strong></p>
            <p class="fee-text">Prowizja: {{ resultFee | number:'1.2-2' }} {{ targetCurrency }} ({{ fee }}%)</p>
            <p><strong>Kwota netto: {{ resultTotal | number:'1.2-2' }} {{ targetCurrency }}</strong></p>
        </div>
    </div>
</div>
