<div class="container">
    <h1 class="mb-4">Symulator Wymiany Walut</h1>
    <div class="exchange-form p-4 border rounded">
        <!-- Kontrola kwoty -->
        <div class="form-group mb-3">
            <label for="amount" class="form-label">Kwota do wymiany:</label>
            <input type="number" id="amount" placeholder="Wprowadź kwotę" min="0" step="0.01" required [(ngModel)]="amount" class="form-control">
        </div>

        <!-- Kontrola waluty źródłowej -->
        <div class="form-group mb-3">
            <label for="sourceCurrency" class="form-label">Waluta źródłowa:</label>
            <select id="sourceCurrency" required [(ngModel)]="sourceCurrency" class="form-select">
                <option value="" disabled selected>Wybierz walutę źródłową</option>
                @for (currency of availableCurrencies; track currency) {
                    <option [value]="currency">{{ currency }}</option>
                } @empty {
                    <option disabled selected value="">Brak walut dostępnych</option>
                }
            </select>
        </div>

        <!-- Kontrola waluty docelowej -->
        <div class="form-group mb-3">
            <label for="targetCurrency" class="form-label">Waluta docelowa:</label>
            <select id="targetCurrency" required [(ngModel)]="targetCurrency" class="form-select">
                <option value="" disabled selected>Wybierz walutę docelową</option>
                @for (currency of availableCurrencies; track currency) {
                    <option [value]="currency">{{ currency }}</option>
                } @empty {
                    <option disabled selected value="">Brak walut dostępnych</option>
                }
            </select>
        </div>

        <!-- Kontrola prowizji -->
        <div class="form-group mb-4">
            <label for="fee" class="form-label">Prowizja (%):</label>
            <input type="number" id="fee" placeholder="Wprowadź prowizję" min="0" max="100" step="0.01" [(ngModel)]="fee" value="1" class="form-control">
        </div>

        <button (click)="calculateExchange()" class="btn btn-primary mb-4">Oblicz</button>

        <!-- Wynik wymiany -->
        @if (resultAmount !== null) {
            <p class="mb-2">
                <strong>Kwota po kursie:</strong>
                {{ resultAmount | number:'1.2-2' }} {{ targetCurrency }}
            </p>
            
            <p class="mb-2 text-muted">
                <strong>Prowizja:</strong>
                {{ resultFee | number:'1.2-2' }} {{ targetCurrency }}
                ({{ fee }}%)
            </p>
            
            <p class="mt-2 h5">
                <strong>Kwota końcowa:</strong>
                {{ resultTotal | number:'1.2-2' }} {{ targetCurrency }}
            </p>
        } @else {
            <!-- Brak wyniku -->
        }
    </div>
</div>
