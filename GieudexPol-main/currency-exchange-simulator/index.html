<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symulator Wymiany Walut</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Symulator Wymiany Walut</h1>
        <div class="exchange-form">
            <div class="form-group">
                <label for="amount">Kwota do wymiany (PLN):</label>
                <input type="number" id="amount" placeholder="Wprowadź kwotę" min="0" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="targetCurrency">Waluta docelowa:</label>
                <select id="targetCurrency" required>
                    <option value="" disabled selected>Wybierz walutę</option>
                    <option value="USD">Dolar amerykański (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Funt szterling (GBP)</option>
                    <option value="JPY">Jen japoński (JPY)</option>
                    <option value="CHF">Frank szwajcarski (CHF)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fee">Prowizja (%):</label>
                <input type="number" id="fee" placeholder="Wprowadź prowizję" min="0" max="100" step="0.01" value="1">
            </div>

            <button id="calculate">Oblicz</button>

            <div class="result" id="result">
                <p>Wynik wymiany:</p>
                <p id="resultAmount">-</p>
                <p id="resultFee">-</p>
                <p id="resultTotal">-</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
