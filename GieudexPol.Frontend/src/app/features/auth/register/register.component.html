<div class="auth-container">
  <h2>Rejestracja</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email:</label>
      <input id="email" type="email" formControlName="email" />
      <div *ngIf="registerForm.get(\'email\')?.invalid && registerForm.get(\'email\')?.touched" class="error-message">
        <div *ngIf="registerForm.get(\'email\')?.errors?.['required']">Email jest wymagany.</div>
        <div *ngIf="registerForm.get(\'email\')?.errors?.['email']">Wprowadź poprawny adres email.</div>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Hasło:</label>
      <input id="password" type="password" formControlName="password" />
      <div *ngIf="registerForm.get(\'password\')?.invalid && registerForm.get(\'password\')?.touched" class="error-message">
        <div *ngIf="registerForm.get(\'password\')?.errors?.['required']">Hasło jest wymagane.</div>
        <div *ngIf="registerForm.get(\'password\')?.errors?.['minlength']">Hasło musi mieć co najmniej 6 znaków.</div>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Potwierdź hasło:</label>
      <input id="confirmPassword" type="password" formControlName="confirmPassword" />
      <div *ngIf="registerForm.get(\'confirmPassword\')?.invalid && registerForm.get(\'confirmPassword\')?.touched" class="error-message">
        <div *ngIf="registerForm.get(\'confirmPassword\')?.errors?.['required']">Potwierdzenie hasła jest wymagane.</div>
        <div *ngIf="registerForm.get(\'confirmPassword\')?.errors?.['passwordMismatch']">Hasła nie pasują do siebie.</div>
      </div>
    </div>

    <button type="submit" [disabled]="registerForm.invalid">Zarejestruj</button>

    <div *ngIf="errorMessage" class="error-message mt-3">
      {{ errorMessage }}
    </div>

    <p class="mt-3">Masz już konto? <a routerLink="/auth/login">Zaloguj się</a></p>
  </form>
</div>
