worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 768;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Root directory for static Angular files (Assumes volume mount to /usr/share/nginx/html)
    root /usr/share/nginx/html;
    index index.html index.htm;

    server {
        listen 80;
        server_name localhost;

        # Try serving the file directly, otherwise fallback to Angular routing (SPA)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the backend container
        location /api/ {
            proxy_pass http://gieudexpol-api:80/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Optional: Add SSL configuration if needed later (HTTPS redirection handled by docker-compose)
    }
}